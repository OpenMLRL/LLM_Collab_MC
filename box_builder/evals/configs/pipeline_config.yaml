# box_builder evaluation - Pipeline (Agent 1 then Agent 2 sees Agent 1 commands)

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  type: "qwen"
  tokenizer_kwargs:
    trust_remote_code: true
  model_kwargs:
    trust_remote_code: true
    device_map: auto
    low_cpu_mem_usage: true
    attn_implementation: sdpa
  dtype: "bf16"
  temperature: 0.618
  top_p: 0.6

dataset:
  name: "box_builder"
  type: "box_builder"
  json_path: "../../../dataset/box_builder/one2.json"
  eval_split: "[:16]"

evaluation:
  num_agents: 2
  num_turns: 2
  num_samples: 5
  max_new_tokens: 512
  temperature: 0.618
  top_p: 0.6

task:
  block_agent1: []
  block_agent2: []
  max_commands: 600
  limited_resource: true

prompt:
  use_chat_template: true

output:
  base_dir: "evals/results"
  verbose: true
